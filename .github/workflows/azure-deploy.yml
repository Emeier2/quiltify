name: Build & Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io

jobs:
  build-and-push:
    name: Build images & push to ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/quiltify-backend:latest
            ${{ env.ACR_LOGIN_SERVER }}/quiltify-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/quiltify-backend:latest
          cache-to: type=inline

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/quiltify-frontend:latest
            ${{ env.ACR_LOGIN_SERVER }}/quiltify-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/quiltify-frontend:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Azure VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.yml,.env.example
          target: ~/quiltify/

      - name: Pull images & restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/quiltify

            # Create .env from secrets if it doesn't exist yet
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Log in to ACR
            echo "${{ secrets.ACR_PASSWORD }}" | \
              docker login ${{ env.ACR_LOGIN_SERVER }} \
              -u ${{ secrets.ACR_USERNAME }} --password-stdin

            # Pull latest images and restart
            IMAGE_REGISTRY=${{ env.ACR_LOGIN_SERVER }}/ \
              docker compose pull

            IMAGE_REGISTRY=${{ env.ACR_LOGIN_SERVER }}/ \
              docker compose up -d --remove-orphans
